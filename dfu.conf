# MCUmgr/MCUboot OTA overlay — use via EXTRA_CONF_FILE=dfu.conf
# For boards with >= 512KB flash (nRF52832, nRF52833, nRF54L15).
# Composes with prj.conf or prj-lowpower.conf; do NOT use standalone.
#
# Reference: zephyr/samples/subsys/mgmt/mcumgr/smp_svr/
#   prj.conf (core MCUmgr) + overlay-bt.conf (BLE transport)

# MCUmgr core + dependencies (from smp_svr/prj.conf)
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_MCUMGR=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_BOOTLOADER_MCUBOOT=y

# Image management (upload, list, confirm, erase)
CONFIG_IMG_MANAGER=y
CONFIG_MCUMGR_GRP_IMG=y

# OS management (reset after upload)
CONFIG_MCUMGR_GRP_OS=y
# Note: CONFIG_MCUMGR_GRP_OS_RESET_NOTIFICATION not available in NCS 2.8.0

# Larger stacks for image hashing/flash writes (from smp_svr/prj.conf)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2304
CONFIG_MAIN_STACK_SIZE=2048

# BLE transport (from smp_svr/overlay-bt.conf)
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_TRANSPORT_BT_CONN_PARAM_CONTROL=y

# Large BT buffers for SMP throughput
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_BUF_ACL_RX_SIZE=502
CONFIG_BT_BUF_ACL_TX_SIZE=502
# BT_CTLR_DATA_LENGTH_MAX=251 requires BT_LL_SW_SPLIT; SDC handles this internally

# SMP reassembly: 5 BLE writes at MTU 498 (from smp_svr/overlay-bt.conf)
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=2475
CONFIG_MCUMGR_GRP_OS_MCUMGR_PARAMS=y
CONFIG_MCUMGR_TRANSPORT_WORKQUEUE_STACK_SIZE=4608

# Dynamic SMP service registration — unregistered at boot, only active
# during FirmwareUpload state (security: prevents unauthenticated access).
# Requires BT_GATT_SERVICE_CHANGED (overrides prj.conf's =n).
CONFIG_BT_GATT_SERVICE_CHANGED=y
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_MCUMGR_TRANSPORT_BT_DYNAMIC_SVC_REGISTRATION=y

# Flash write permission (needed for image slot writes)
CONFIG_MPU_ALLOW_FLASH_WRITE=y
