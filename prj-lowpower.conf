# Release/production overlay — apply via -DEXTRA_CONF_FILE=prj-lowpower.conf
# on top of prj.conf. Strips logging + RTT subsystem (saves ~21 KB of flash).
#
# Note: do NOT set CONFIG_GPIO=n here — main.cpp references LED GPIO devices
# unconditionally, and the board defconfig auto-enables GPIO for Nordic SoCs.

CONFIG_LOG=n
CONFIG_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_RTT_CONSOLE=n
CONFIG_ZMS_LOG_LEVEL_DBG=n
