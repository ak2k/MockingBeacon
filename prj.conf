CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_ZMS_LOG_LEVEL_DBG=y

##CONFIG_LOG_MODE_IMMEDIATE=y

CONFIG_UART_CONSOLE=n
CONFIG_BT=y
CONFIG_BT_SETTINGS=n
CONFIG_BT_PRIVACY=n
CONFIG_BT_GATT_AUTHORIZATION_CUSTOM=y
CONFIG_SPI=n
CONFIG_PWM=n
##CONFIG_I2C=y

CONFIG_SERIAL=n
CONFIG_DYNAMIC_INTERRUPTS=n
CONFIG_IRQ_OFFLOAD=n
##CONFIG_THREAD_STACK_INFO=n
CONFIG_THREAD_CUSTOM_DATA=n
CONFIG_FPU=n
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
CONFIG_WATCHDOG=y
CONFIG_ADC=y
CONFIG_GPIO=y
##CONFIG_BOARD_ENABLE_DCDC=y
CONFIG_POWEROFF=y

CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=y

CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y
#CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
#CONFIG_CLOCK_CONTROL_NRF_K32SRC_500PPM=y

CONFIG_BT_PERIPHERAL=y

CONFIG_BT_DEBUG_NONE=y
CONFIG_BT_ASSERT=n
CONFIG_BT_DATA_LEN_UPDATE=n
CONFIG_BT_PHY_UPDATE=n
CONFIG_BT_GATT_CACHING=n
CONFIG_BT_GATT_SERVICE_CHANGED=n
CONFIG_BT_GAP_PERIPHERAL_PREF_PARAMS=y
##CONFIG_BT_HCI_VS_EXT=y
# Disable Bluetooth controller features not needed
CONFIG_BT_CTLR_PRIVACY=n
CONFIG_BT_CTLR_PHY_2M=n

# Reduce Bluetooth buffers

CONFIG_BT_BUF_EVT_DISCARDABLE_COUNT=1
CONFIG_BT_BUF_EVT_DISCARDABLE_SIZE=43
# Zephyr 4.x BUILD_ASSERT (include/zephyr/bluetooth/buf.h:168-172):
#   BT_BUF_EVT_RX_COUNT must be > BT_BUF_ACL_TX_COUNT (=3 below).
CONFIG_BT_BUF_EVT_RX_COUNT=4
##CONFIG_BT_CONN_TX_MAX=2
CONFIG_BT_L2CAP_TX_BUF_COUNT=2
##CONFIG_BT_CTLR_RX_BUFFERS=2
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_BUF_ACL_TX_SIZE=27
#CONFIG_BT_BUF_ACL_RX_SIZE=27

# Preemptive stack pinning against Zephyr 4.x default flips (plan §1g):
# - IDLE 128 → 256: 4.x init path tighter with stack canaries.
# - BT_HCI_TX 640 → 768: 4.2 bt_hci_cmd_alloc path tighter (Phase 3
#   change pinned now to avoid surprise during the upgrade).
# Others (MAIN/BT_RX/ISR/SYSTEM_WORKQUEUE) already at plan's targets.
CONFIG_BT_RX_STACK_SIZE=1024
CONFIG_BT_HCI_TX_STACK_SIZE_WITH_PROMPT=y
CONFIG_BT_HCI_TX_STACK_SIZE=768
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
CONFIG_MAIN_STACK_SIZE=1024
CONFIG_IDLE_STACK_SIZE=256
CONFIG_ISR_STACK_SIZE=1024

CONFIG_FLASH=y
# NCS 3.2+ no longer auto-selects FLASH_MAP from FLASH; ZMS depends on it.
CONFIG_FLASH_MAP=y
# ZMS settings backend (explicit enable + NVS disable). NCS 3.0+ makes ZMS
# the default for Cortex-M; we pin both to avoid silent default flips.
# CONFIG_SETTINGS_ZMS_MAX_COLLISIONS_BITS is N/A for this firmware — we
# use direct zms_read()/zms_write() with hand-assigned uint16_t IDs
# (src/beacon_nvs_ids.hpp), not the BT_SETTINGS framework.
CONFIG_ZMS=y
CONFIG_NVS=n
CONFIG_ZMS_LOOKUP_CACHE=y
# ZMS_LOOKUP_CACHE_FOR_SETTINGS removed: depends on SETTINGS_ZMS which
# requires BT_SETTINGS (we have BT_SETTINGS=n). Was silently ignored in
# NCS 3.0-3.1; NCS 3.2 treats it as an error.
# 128 B RAM on nrf52810 (16 × 8 B/entry). Bump to 64 on nrf54l15 only
# (512 B) via board overlay if settings lookup becomes hot.
CONFIG_ZMS_LOOKUP_CACHE_SIZE=16
CONFIG_REBOOT=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# RAM/flash savers for Zephyr 4.x defaults (per migration plan §1d):
# - LOG_BUFFER_SIZE: default rose to 1024 in 4.x; 512 saves ~512 B bss.
# - CBPRINTF_REDUCED_INTEGRAL: drop 64-bit printf paths; ~400-800 B text.
# - BT_HCI_ACL_FLOW_CONTROL: needed only for >1 conn; ~150 B for our 1-conn case.
# - BT_LONG_WQ: defaults n (BT_GATT_CACHING=n above); explicit pin against
#   future Kconfig flips; ~1 KB if it ever auto-enables.
CONFIG_LOG_BUFFER_SIZE=512
CONFIG_CBPRINTF_REDUCED_INTEGRAL=y
CONFIG_BT_HCI_ACL_FLOW_CONTROL=n
CONFIG_BT_LONG_WQ=n
# Plan §1g additional levers (post-stack-pinning audit):
# - BT_CTLR_DUP_FILTER_LEN=0: scanner-only feature; BT_OBSERVER=n here
#   (we're peripheral-only). Saves ~200-400 B bss on nrf52810.
# Note: plan also suggested CONFIG_BT_CONN_TX_MAX=2 but Kconfig minimum
# is 3 in NCS 3.0.2 (range [3, 255] at subsys/bluetooth/host/Kconfig:330).
CONFIG_BT_CTLR_DUP_FILTER_LEN=0

# C++ support
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_GLIBCXX_LIBCPP=y
CONFIG_CPP_EXCEPTIONS=n
CONFIG_CPP_RTTI=n

