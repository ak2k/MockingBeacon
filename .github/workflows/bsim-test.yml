name: BabbleSim BLE Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: bsim-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bsim-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: ak2k
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build and run BabbleSim tests
        run: nix build .#bsim-test
