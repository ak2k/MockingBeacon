name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required by cache-nix-action to purge old caches
permissions:
  actions: write
  contents: read

jobs:
  host-tests:
    name: Host tests (ASan/UBSan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build and run tests
        run: nix run .#test

  ble-client-tests:
    name: BLE client tests (Bumble)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run Bumble BLE client tests
        run: nix run .#test-ble

  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Check formatting
        run: nix run .#lint

  cross-compile:
    name: Cross-compile (${{ matrix.board }}${{ matrix.dfu && ' +DFU' || '' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - board: kkm_p1_nrf52810
            nix: true
          - board: nrf52dk/nrf52832
            nix: false
          - board: nrf52840dk/nrf52840
            nix: false
          - board: nrf52833dk/nrf52833
            nix: false
          - board: thingy52/nrf52832
            nix: false
          # DFU builds (sysbuild + MCUboot)
          - board: nrf52dk/nrf52832
            nix: false
            dfu: true
          - board: nrf52833dk/nrf52833
            nix: false
            dfu: true
          - board: nrf54l15dk/nrf54l15/cpuapp
            nix: false
            dfu: true
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build firmware (pure Nix)
        if: matrix.nix
        run: |
          nix build .#firmware -L
          cat result/size.txt

      - name: Build firmware (west build)
        if: "!matrix.nix && !matrix.dfu"
        run: |
          nix develop --command bash -c '
            west init -l .
            cd .. && west update --narrow -o=--depth=1
            cd $OLDPWD
            west build --board ${{ matrix.board }} -d build-out --pristine --no-sysbuild
            arm-none-eabi-size build-out/zephyr/zephyr.elf
          '

      - name: Build firmware (DFU + MCUboot)
        if: matrix.dfu
        run: |
          nix develop --command bash -c '
            west init -l .
            cd .. && west update --narrow -o=--depth=1
            cd $OLDPWD
            export PYTHONPATH=$(python3 -c "import site; print('"'"':'"'"'.join(site.getsitepackages()))")
            west build --board ${{ matrix.board }} -d build-dfu --pristine \
              -- -DEXTRA_CONF_FILE=dfu.conf
            APP_ELF=$(find build-dfu -name zephyr.elf -not -path "*/mcuboot/*" -print -quit)
            arm-none-eabi-size "$APP_ELF"
          '

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Override the workflow-level permissions to add security-events: write
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-and-quality

      - name: Build for CodeQL
        run: |
          cd tests/host
          cmake -B build \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER=gcc
          cmake --build build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run cppcheck
        run: nix run .#cppcheck
