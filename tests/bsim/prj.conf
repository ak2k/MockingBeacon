CONFIG_BT=y
CONFIG_BT_DEVICE_NAME="everytag-test"

CONFIG_BT_BROADCASTER=y
CONFIG_BT_OBSERVER=y
# Use Zephyr open-source BLE controller (NCS SDC is ARM-only, won't work on x86 bsim)
CONFIG_BT_LL_SW_SPLIT=y

CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_EXTERNAL_LIBCPP=y

CONFIG_ASSERT=y
CONFIG_LOG=y
CONFIG_ARCH_POSIX_TRAP_ON_FATAL=y
