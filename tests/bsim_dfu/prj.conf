CONFIG_BT=y
CONFIG_BT_DEVICE_NAME="everytag-dfu-test"

# Server side (device 0): MCUmgr SMP over BLE
CONFIG_BT_PERIPHERAL=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_GRP_OS=y

# Client side (device 1): BLE central + GATT client
CONFIG_BT_CENTRAL=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_GATT_CLIENT=y

# BabbleSim BLE controller
CONFIG_BT_LL_SW_SPLIT=y

# Common
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_EXTERNAL_LIBCPP=y
CONFIG_ASSERT=y
CONFIG_LOG=y
CONFIG_ARCH_POSIX_TRAP_ON_FATAL=y

# MCUmgr needs these
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
