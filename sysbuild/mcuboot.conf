CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=n
CONFIG_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n

CONFIG_MCUBOOT_SERIAL=n
CONFIG_BOOT_SERIAL_UART=n

# Image signature verification — reject unsigned/tampered firmware
CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y
CONFIG_BOOT_VALIDATE_SLOT0=y

# Uses MCUboot's default dev key (root-ec-p256.pem) for development.
# For production: generate a private key, set CONFIG_BOOT_SIGNATURE_KEY_FILE,
# and sign images with: west sign -t imgtool -- --key <your-key.pem>
