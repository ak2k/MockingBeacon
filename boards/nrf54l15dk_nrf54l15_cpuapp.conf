# nRF54L15 board-specific Kconfig overrides
# Merged AFTER prj.conf — only override what's incompatible

# RRAM storage
CONFIG_SOC_FLASH_NRF_RRAM=y

# RAM power library not available for nrf54L
CONFIG_RAM_POWER_DOWN_LIBRARY=n
CONFIG_RAM_POWER_ADJUST_ON_HEAP_RESIZE=n

# Newlib NANO not available for nrf54L (full newlib works fine)
CONFIG_NEWLIB_LIBC_NANO=n
